<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Narziss</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>Narziss</h1>
          <p>Auto Socratic mode</p>
        </div>
        <label class="switch" title="Turn Narziss prompt injection on or off">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </header>

      <section class="summary" aria-label="How Narziss works">
        <strong>Turn it on, then type what you want to learn.</strong>
        <span>Narziss will infer the topic and learning phase from your message.</span>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
